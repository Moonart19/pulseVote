<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polls</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'polls/style.css' %}">
  <style>
    .create-poll-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 22px;
  background: rgba(61, 255, 160, 0.08);
  border: 1px solid rgba(61, 255, 160, 0.22);
  border-radius: 100px;
  color: #3dffa0;
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  margin-top: 1rem;
  margin-bottom: 2rem;
}

.create-poll-btn:hover {
  background: rgba(61, 255, 160, 0.15);
  box-shadow: 0 0 24px rgba(61, 255, 160, 0.2);
  transform: translateY(-2px);
}
  </style>
</head>
  <body>
    <h1>Available Current polls</h1>
    <a href="{% url 'polls:create' %}" class="create-poll-btn">+ Create Poll</a>
    <h2><a href="{% url 'home' %}" class="home-page">Go to Homepage</a></h2>
    <div class="container">
      {% if latest_question_list %}
      <ul class="link-container">
        {% for question in latest_question_list %}
        <li><a href="{% url 'polls:detail' question.id %}">{{ question.question_text }}</a></li>
        {% endfor %}
      </ul>
      {% else %}
      <p>No polls are avilable.</p>
      {% endif %}
    </div>
  </body>
</html>
