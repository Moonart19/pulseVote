{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Poll — PulseVote</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface-2: #f2f0eb;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text: #1a1814;
      --text-2: #4a4540;
      --text-muted: #8a8480;
      --teal: #0d9488;
      --teal-light: rgba(13,148,136,0.1);
      --green: #16a34a;
      --green-light: rgba(22,163,74,0.1);
      --red: #dc2626;
      --red-light: rgba(220,38,38,0.08);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --radius-full: 100px;
      --transition: 0.35s cubic-bezier(0.16,1,0.3,1);
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3rem 1.25rem 4rem;
      font-family: var(--font-body);
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse 60% 40% at 10% 10%, rgba(13,148,136,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 90%, rgba(217,119,6,0.04) 0%, transparent 60%);
    }

    .page-wrapper {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(1.5rem, 4vw, 2.5rem);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      animation: cardReveal 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      opacity: 0.5;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-body);
      font-weight: 600;
      margin-bottom: 20px;
      transition: color var(--transition);
    }

    .back-link:hover { color: var(--teal); }

    /* ── Page title ── */
    .page-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      color: var(--text);
    }

    .page-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ── Section label ── */
    .section-label {
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-group { margin-bottom: 22px; }

    /* ── Inputs ── */
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: all var(--transition);
    }

    .form-input:focus {
      border-color: rgba(13,148,136,0.4);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.08);
    }

    .form-input::placeholder { color: var(--text-muted); }

    /* ── Choices ── */
    .choices-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      align-items: center;
      animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }

    .choice-row .form-input { flex: 1; }

    .remove-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(220,38,38,0.2);
      background: var(--red-light);
      color: var(--red);
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .add-choice-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: var(--surface-2);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      justify-content: center;
    }

    .add-choice-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-light);
    }

    /* ── Error ── */
    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: var(--red-light);
      border: 1px solid rgba(220,38,38,0.15);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    .error-msg::before { content: '⚠'; }

    /* ── Preview ── */
    .preview-section { display: none; }
    .preview-section.visible { display: block; }

    .preview-question {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .preview-choice {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-2);
    }

    .preview-choice::before {
      content: '';
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      flex-shrink: 0;
    }

    /* ── Actions ── */
    .form-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn-preview {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      flex: 1;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .btn-preview:hover {
      border-color: var(--border-strong);
      color: var(--text-2);
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      flex: 2;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--teal);
      border: none;
      color: #fff;
      box-shadow: 0 4px 14px rgba(13,148,136,0.3);
      transition: all var(--transition);
    }

    .btn-submit:hover {
      background: #0f766e;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(13,148,136,0.4);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

    @keyframes cardReveal {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { border-radius: var(--radius-md); }
      .form-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- ── HEADER ── -->
  <div class="card">
    <a class="back-link" href="{% url 'polls:index' %}">← All Polls</a>
    <h1 class="page-title">Create a Poll</h1>
    <p class="page-subtitle">Ask anything — your poll goes live instantly</p>
  </div>

  <!-- ── FORM ── -->
  <div class="card">
    {% if errors %}
      <div class="error-msg">{{ errors }}</div>
    {% endif %}

    <form method="post" id="poll-form">
      {% csrf_token %}

      <!-- Question -->
      <div class="form-group">
        <p class="section-label">Question</p>
        <input
          type="text"
          name="question_text"
          class="form-input"
          id="question-input"
          placeholder="Ask a question..."
          value="{{ form.question_text.value|default:'' }}"
          required
        />
      </div>

      <!-- Choices -->
      <div class="form-group">
        <p class="section-label">
          Choices
          <span style="color: var(--text-muted); font-size: 0.65rem; letter-spacing: 0.04em; text-transform: none; font-family: var(--font-body); font-weight: 300;">(min. 2)</span>
        </p>
        <div class="choices-list" id="choices-list">
          <div class="choice-row">
            <input type="text" name="choices" class="form-input" placeholder="Choice 1" value="{{ prev_choices.0|default:'' }}">
            <button type="button" class="remove-btn" onclick="removeChoice(this)" style="visibility:hidden">×</button>
          </div>
          <div class="choice-row">
            <input type="text" name="choices" class="form-input" placeholder="Choice 2" value="{{ prev_choices.1|default:'' }}">
            <button type="button" class="remove-btn" onclick="removeChoice(this)" style="visibility:hidden">×</button>
          </div>
        </div>
        <button type="button" class="add-choice-btn" onclick="addChoice()">+ Add Choice</button>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-preview" onclick="togglePreview()">Preview</button>
        <button type="submit" class="btn-submit">Publish Poll →</button>
      </div>
    </form>
  </div>

  <!-- ── PREVIEW ── -->
  <div class="card preview-section" id="preview-card">
    <p class="section-label">Preview</p>
    <div id="preview-question" class="preview-question">Your question will appear here</div>
    <div id="preview-choices"></div>
  </div>

</div>

<script>
  let choiceCount = 2;

  function addChoice() {
    choiceCount++;
    const list = document.getElementById('choices-list');
    const row = document.createElement('div');
    row.className = 'choice-row';
    row.innerHTML = `
      <input type="text" name="choices" class="form-input" placeholder="Choice ${choiceCount}">
      <button type="button" class="remove-btn" onclick="removeChoice(this)">×</button>
    `;
    list.appendChild(row);
    updateRemoveButtons();
    row.querySelector('input').focus();
  }

  function removeChoice(btn) {
    btn.closest('.choice-row').remove();
    choiceCount--;
    updateRemoveButtons();
    updatePreview();
  }

  function updateRemoveButtons() {
    const rows = document.querySelectorAll('.choice-row');
    rows.forEach(row => {
      const btn = row.querySelector('.remove-btn');
      btn.style.visibility = rows.length > 2 ? 'visible' : 'hidden';
    });
  }

  function togglePreview() {
    updatePreview();
    const card = document.getElementById('preview-card');
    card.classList.toggle('visible');
    const btn = document.querySelector('.btn-preview');
    btn.innerText = card.classList.contains('visible') ? 'Hide Preview' : 'Preview';
    if (card.classList.contains('visible')) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function updatePreview() {
    const question = document.getElementById('question-input').value || 'Your question will appear here';
    document.getElementById('preview-question').innerText = question;

    const choiceInputs = document.querySelectorAll('input[name="choices"]');
    const container = document.getElementById('preview-choices');
    container.innerHTML = '';
    choiceInputs.forEach(input => {
      if (input.value.trim()) {
        const div = document.createElement('div');
        div.className = 'preview-choice';
        div.innerText = input.value.trim();
        container.appendChild(div);
      }
    });
  }

  document.getElementById('question-input').addEventListener('input', updatePreview);
  document.getElementById('choices-list').addEventListener('input', updatePreview);
</script>

</body>
</html>
